<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none">
  <defs>
    <linearGradient id="facGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
  </defs>

  <!-- Soft ground -->
  <ellipse cx="240" cy="360" rx="180" ry="24" fill="#7dd3fc" opacity="0.25"/>

  <!-- Factory / process building -->
  <rect x="80" y="140" width="200" height="180" rx="12" fill="#fff" stroke="#bae6fd" stroke-width="2"/>
  <rect x="80" y="120" width="200" height="28" rx="6" fill="url(#facGrad)"/>
  <text x="180" y="139" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff">PROSES HIMUDO</text>

  <!-- Windows -->
  <rect x="100" y="170" width="40" height="36" rx="4" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="160" y="170" width="40" height="36" rx="4" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="220" y="170" width="40" height="36" rx="4" fill="#e0f2fe" stroke="#7dd3fc"/>

  <!-- Process steps inside -->
  <circle cx="120" cy="250" r="18" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="120" y="255" text-anchor="middle" font-size="12" font-weight="800" fill="#0284c7">1</text>
  <line x1="140" y1="250" x2="160" y2="250" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="3 2"/>
  <circle cx="180" cy="250" r="18" fill="#dbeafe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="180" y="255" text-anchor="middle" font-size="12" font-weight="800" fill="#0284c7">10</text>
  <line x1="200" y1="250" x2="220" y2="250" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="3 2"/>
  <circle cx="240" cy="250" r="18" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <path d="M232 250l5 5 10-12" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <text x="180" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="600">10x Pencucian Galon</text>
  <text x="180" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Standar Food Safety</text>

  <!-- Large water drop -->
  <path d="M360 80C360 80 300 160 300 220a60 60 0 00120 0C420 160 360 80 360 80z" fill="url(#facGrad)" opacity="0.95"/>
  <ellipse cx="340" cy="210" rx="14" ry="22" fill="#fff" opacity="0.3"/>
  <text x="360" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#fff">O₂</text>
  <text x="360" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e0f2fe">pH seimbang</text>

  <!-- Floating badges -->
  <rect x="300" y="300" width="100" height="36" rx="18" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
  <circle cx="320" cy="318" r="10" fill="#dcfce7"/>
  <path d="M316 318l3 3 6-7" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <text x="338" y="322" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#0f172a">Higienis</text>

  <rect x="40" y="80" width="90" height="36" rx="18" fill="#fff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="85" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#0284c7">Medan, Sumut</text>

  <!-- Bubbles -->
  <circle cx="400" cy="100" r="6" fill="#7dd3fc" opacity="0.5"/>
  <circle cx="420" cy="140" r="4" fill="#38bdf8" opacity="0.4"/>
  <circle cx="390" cy="60" r="3" fill="#0ea5e9" opacity="0.35"/>
</svg>
